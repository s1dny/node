apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: immich
  namespace: flux-system
spec:
  image: ghcr.io/immich-app/immich-server
  interval: 1h0m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: immich
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: immich
  filterTags:
    pattern: "^v(?P<version>.*)$"
    extract: "$version"
  policy:
    semver:
      range: 2.x
